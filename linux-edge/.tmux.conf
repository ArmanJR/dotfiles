# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# --- Key bindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# --- Status bar ---
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=#a0a0a0"
set -g status-left "#[fg=#c0c0c0,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=#808080]%b %d  %H:%M "
set -g status-right-length 30

# Window list
setw -g window-status-format "#[fg=#606060] #I:#W "
setw -g window-status-current-format "#[fg=#ffffff,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#606060"

# Messages
set -g message-style "bg=default,fg=#ffffff"
